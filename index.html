<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Floristería Las Cuatro Esquinas</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

    <header>
        <div class="container">
            <h1>Floristería Las Cuatro Esquinas</h1>
            <nav>
                <a href="#catalogo" class="btn-nav">Catálogo</a>
                <a href="#ofertas" class="btn-nav">Ofertas</a>
                <a href="#ubicacion" class="btn-nav">Ubicación</a>
            </nav>
        </div>
    </header>

    <main class="container">
        <section id="catalogo">
            <div class="product-grid">
                
                <div class="card">
                    <div class="card-img-container">
                        <img src="Imagenes/RamosdeRosas.jpeg" alt="Ramo de Rosas">
                    </div>
                    <div class="card-info">
                        <h3>Ramo de Rosas Premium</h3>
                        <p class="price">$45.00</p>
                        <a href="https://wa.me/584127285837?text=Hola,%20me%20interesa%20el%20Ramo%20de%20Rosas%20Premium" class="btn-whatsapp">Pedir por WhatsApp</a>
                    </div>
                </div>

                <div class="card">
                    <div class="card-img-container">
                        <img src="Imagenes/ArrglosdeMixtos.webp" alt="Arreglo de Girasoles">
                    </div>
                    <div class="card-info">
                        <h3>Arreglo de Girasoles</h3>
                        <p class="price">$35.00</p>
                        <a href="https://wa.me/584127285837?text=Hola,%20me%20interesa%20el%20Arreglo%20de%20Girasoles" class="btn-whatsapp">Pedir por WhatsApp</a>
                    </div>
                </div>

                <div class="card">
                    <div class="card-img-container">
                        <img src="Imagenes/CajasdeRegalos.jpg" alt="Caja de Flores">
                    </div>
                    <div class="card-info">
                        <h3>Caja de Flores Mixtas</h3>
                        <p class="price">$55.00</p>
                        <a href="https://wa.me/584127285837?text=Hola,%20me%20interesa%20la%20Caja%20de%20Flores%20Mixtas" class="btn-whatsapp">Pedir por WhatsApp</a>
                    </div>
                </div>

            </div>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2024 Floristería Las Cuatro Esquinas - Estilo Minimalista</p>
        </div>
    </footer>

</body>
</html>
